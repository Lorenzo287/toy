name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            asset_name: toy-linux.tar.gz
            nob_bootstrap: cc -std=c11 nob.c -o nob
            nob_test: ./nob test
          - os: windows-latest
            asset_name: toy-windows.zip
            nob_bootstrap: clang -std=c11 nob.c -o nob.exe
            nob_test: .\nob.exe test
          - os: macos-latest
            asset_name: toy-macos.tar.gz
            nob_bootstrap: cc -std=c11 nob.c -o nob
            nob_test: ./nob test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Bootstrap Nob
        run: ${{ matrix.nob_bootstrap }}

      - name: Test
        run: ${{ matrix.nob_test }}

      - name: Check generated builtin metadata
        run: node tools/generate-builtins.js --check

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.asset_name }} -C build/gcc/release toy core

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path build/gcc/release/toy.exe,build/gcc/release/core -DestinationPath ${{ matrix.asset_name }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
