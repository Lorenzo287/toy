name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            asset_name: toy-linux.tar.gz
            nob_bootstrap: cc -std=c11 nob.c -o nob
            nob_test: ./nob test
            nob_dist: ./nob dist
          - os: windows-latest
            asset_name: toy-windows.zip
            nob_bootstrap: clang -std=c11 nob.c -o nob.exe
            nob_test: .\nob.exe test
            nob_dist: .\nob.exe dist
          - os: macos-latest
            asset_name: toy-macos.tar.gz
            nob_bootstrap: cc -std=c11 nob.c -o nob
            nob_test: ./nob test
            nob_dist: ./nob dist

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tools/tree-sitter-toy/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tools/toy-lsp/go.mod
          cache-dependency-path: tools/toy-lsp/go.sum

      - name: Bootstrap Nob
        run: ${{ matrix.nob_bootstrap }}

      - name: Test
        run: ${{ matrix.nob_test }}

      - name: Check generated builtin metadata
        run: node tools/generate-builtins.js --check

      - name: Generate Tree-sitter parser for SDK tools
        working-directory: tools/tree-sitter-toy
        run: |
          npm ci --ignore-scripts
          npm rebuild tree-sitter-cli
          npm run generate

      - name: Stage SDK
        run: ${{ matrix.nob_dist }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.asset_name }} -C dist toy

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/toy -DestinationPath ${{ matrix.asset_name }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
