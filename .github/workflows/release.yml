name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            asset_name: toy-linux.tar.gz
            nob_bootstrap: cc nob.c -o nob
            nob_test: ./nob test
            nob_dist: ./nob dist
          - os: windows-latest
            asset_name: toy-windows.zip
            nob_bootstrap: clang nob.c -o nob.exe
            nob_test: .\nob.exe test
            nob_dist: .\nob.exe dist
          - os: macos-latest
            asset_name: toy-macos.tar.gz
            nob_bootstrap: cc nob.c -o nob
            nob_test: ./nob test
            nob_dist: ./nob dist

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tools/go.mod
          cache-dependency-path: tools/go.sum

      - name: Bootstrap Nob
        run: ${{ matrix.nob_bootstrap }}

      - name: Test runtime
        run: ${{ matrix.nob_test }}

      - name: Test tools
        run: go -C tools test ./...

      - name: Stage SDK
        run: ${{ matrix.nob_dist }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.asset_name }} -C dist toy

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/toy -DestinationPath ${{ matrix.asset_name }}

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
